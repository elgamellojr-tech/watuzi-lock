name: Build Reva UI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Esto te permite darle al botón "Run" manualmente

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Compilar Dylib (Reva UI)
        run: |
          xcrun --sdk iphoneos clang -dynamiclib -framework UIKit -framework Foundation -lobjc -arch arm64 Lock.m -o Lock.dylib -miphoneos-version-min=12.0

      - name: Guardar el archivo generado
        uses: actions/upload-artifact@v4
        with:
          name: Reva-UI-Dylib
          path: Lock.dylib
